## Your Knowledge Base:

### SQL JOINS
SQL Joins combine rows from multiple tables using a related column.
Types: INNER JOIN (matching rows only), LEFT JOIN (all left + matched right), RIGHT JOIN (all right + matched left), FULL JOIN (all rows from both).
Example: SELECT customers.name, orders.amount FROM customers INNER JOIN orders ON customers.id = orders.customer_id;
Use Case: Merging customer and transaction data for behavioral analysis.

### SQL AGGREGATIONS
Aggregation functions compute values across multiple rows: COUNT(), SUM(), AVG(), MAX(), MIN()
Example: SELECT department, AVG(salary) AS avg_salary FROM employees GROUP BY department;
Use Case: KPI calculations like average revenue per region.

### SQL CTEs (Common Table Expressions)
CTEs are temporary named result sets within a query.
Example: WITH SalesCTE AS (SELECT region, SUM(sales) AS total_sales FROM orders GROUP BY region) SELECT * FROM SalesCTE WHERE total_sales > 10000;
Use Case: Improving readability of complex analytical queries.

### SQL WINDOW FUNCTIONS
Window functions perform calculations across related rows without collapsing them.
Example: SELECT name, salary, RANK() OVER (ORDER BY salary DESC) AS rank FROM employees;
Use Case: Ranking, running totals, moving averages, cohort analysis.

### PYTHON PANDAS
Pandas is a Python library for structured data manipulation using DataFrames.
Load data: import pandas as pd; df = pd.read_csv("sales.csv")
Clean: df.dropna(inplace=True); df['date'] = pd.to_datetime(df['date']); df['sales'] = df['sales'].astype(float)

### PYTHON MATPLOTLIB

### STATISTICS – PROBABILITY

### STATISTICS – HYPOTHESIS TESTING
Steps: 1) Define H0 (null hypothesis) 2) Define H1 (alternative hypothesis) 3) Set significance level (alpha) 4) Compute test statistic 5) Accept or reject H0

### STATISTICS – DESCRIPTIVE STATISTICS

function parseMD(text){
  if(!text)return'';
  return text
    .replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>`<pre>${escH(c.trim())}</pre>`)
    .replace(/`([^`]+)`/g,(_,c)=>`<code>${escH(c)}</code>`)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/💡 Pro Tip:([\s\S]*?)(?=\n\n|\n[#🏢]|$)/g,'<div class="pro-tip">💡 <strong>Pro Tip:</strong>$1</div>')
    .replace(/🏢 Real-world Use Case:([\s\S]*?)(?=\n\n|\n[#💡]|$)/g,'<div class="use-case">🏢 <strong>Real-world Use Case:</strong>$1</div>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,(m)=>`<ul>${m}</ul>`)
    .replace(/\n{2,}/g,'<br/><br/>')
    .replace(/\n/g,'<br/>');
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseQuiz(text){
  const answerMap={};
  const ansMatch=text.match(/ANSWERS?:\s*([1-9]-[A-D](?:,[1-9]-[A-D])*)/i);
  if(ansMatch){
    ansMatch[1].split(',').forEach(a=>{
      const[num,letter]=a.trim().split('-');
      answerMap[parseInt(num)]=letter;
    });
  }
  const blocks=text.split(/(?=\d+\.)/).filter(b=>/^\d+\./.test(b.trim()));
  const questions=[];
  blocks.forEach((block,i)=>{
    const lines=block.trim().split('\n');
    const qLine=lines[0].replace(/^\d+\.\s*/,'').trim();
    const opts={};
    lines.slice(1).forEach(l=>{
      const m=l.match(/^([A-D])[\.\)]\s+(.+)/);
      if(m)opts[m[1]]=m[2].trim();
    });
    if(qLine&&Object.keys(opts).length>=2){
      questions.push({q:qLine,opts,answer:answerMap[i+1]||null,num:i+1});
    }
  });
  return questions;
}

function QuizWidget({questions,onDone}){
  const[answers,setAnswers]=useState({});
  const[revealed,setRevealed]=useState(false);
  const[timeLeft,setTimeLeft]=useState(600);
  useEffect(()=>{
    if(revealed)return;
    const t=setInterval(()=>setTimeLeft(p=>{if(p<=1){setRevealed(true);return 0;}return p-1;}),1000);
    return()=>clearInterval(t);
  },[revealed]);
  const mins=Math.floor(timeLeft/60);
  const secs=timeLeft%60;
  const pick=(qi,opt)=>{if(revealed||answers[qi]!==undefined)return;setAnswers(p=>({...p,[qi]:opt}));};
  const submit=()=>setRevealed(true);
  const allAnswered=Object.keys(answers).length===questions.length;
  useEffect(()=>{if(revealed&&onDone){const s=questions.reduce((sc,q)=>sc+(answers[q.num]===q.answer?1:0),0);onDone(s,questions.length,answers,questions);}},[revealed]);
  return(
    <div className="quiz-card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:12,fontWeight:600,color:'#475569'}}>⏱ {mins}:{String(secs).padStart(2,'0')} remaining</span>
        <span style={{fontSize:12,color:'#94a3b8'}}>{Object.keys(answers).length}/{questions.length} answered</span>
      </div>
      <div className="timer-bar">
        <div className="timer-fill" style={{width:`${(timeLeft/600)*100}%`,background:timeLeft<120?'#ef4444':'#6366f1'}}/>
      </div>
      {questions.map(q=>{
        const chosen=answers[q.num];
        return(
          <div key={q.num} style={{marginBottom:18}}>
            <div className="quiz-q">{q.num}. {q.q}</div>
            {Object.entries(q.opts).map(([k,v])=>{
              let cls='quiz-opt';
              if(revealed){
                if(k===q.answer)cls+=' show-correct';
                else if(k===chosen)cls+=' wrong';
              }else if(chosen===k)cls+=' correct';
              return(<button key={k} className={cls} disabled={revealed||chosen!==undefined} onClick={()=>pick(q.num,k)}><strong>{k}.</strong> {v}</button>);
            })}
          </div>
        );
      })}
      {!revealed&&(
        <button onClick={submit} disabled={!allAnswered} style={{width:'100%',padding:'11px',background:allAnswered?'#6366f1':'#e2e8f0',color:allAnswered?'#fff':'#94a3b8',border:'none',borderRadius:9,cursor:allAnswered?'pointer':'default',fontFamily:'Sora,sans-serif',fontSize:13.5,fontWeight:600,marginTop:6,transition:'all 0.15s'}}>
          {allAnswered?'Submit Quiz ✓':'Answer all questions to submit'}
        </button>
      )}
    </div>
  );
}

function ScoreCard({score,total,questions,answers}){
  const pct=Math.round((score/total)*100);
  const emoji=pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';
  const msg=pct>=80?'Outstanding performance!':pct>=60?'Good job — keep practicing!':pct>=40?'Solid effort, room to grow.':'Keep at it — every expert started here!';
  const color=pct>=80?'#16a34a':pct>=60?'#6366f1':pct>=40?'#f59e0b':'#ef4444';
  const wrong=questions.filter(q=>answers[q.num]!==q.answer);
  return(
    <div className="scorecard">
      <div className="score-num" style={{color}}>{emoji} {score}/{total}</div>
      <div className="score-label">{pct}% — {msg}</div>
      {wrong.length>0&&(
        <div style={{marginTop:18}}>
          <div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px'}}>Review these:</div>
          {wrong.map(q=>(
            <div key={q.num} className="score-row">
              <span style={{color:'#ef4444',fontWeight:600,minWidth:28}}>Q{q.num}</span>
              <span style={{flex:1,color:'#334155',fontSize:12}}>{q.q.length>55?q.q.substring(0,55)+'…':q.q}</span>
              <span style={{color:'#22c55e',fontSize:11,fontWeight:600,minWidth:50,textAlign:'right'}}>Ans: {q.answer}</span>
            </div>
          ))}
        </div>
      )}
      <div style={{marginTop:14,padding:'12px 14px',background:'#eef2ff',borderRadius:10}}>
        <div style={{fontSize:12,fontWeight:600,color:'#4338ca',marginBottom:4}}>📋 Personalized next step</div>
        <div style={{fontSize:12.5,color:'#4338ca',lineHeight:1.6}}>
          {wrong.length===0?'Perfect! Challenge yourself with a harder difficulty level.':wrong.length<=2?'Great foundation! Review the missed topics above, then attempt Advanced level.':'Focus on the weak areas above. Re-read the concept, practice with examples, then retake.'}
        </div>
      </div>
    </div>
  );
}

function App(){

  const chatRef=useRef();
  const inputRef=useRef();

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs,loading]);
  const curTopic=TOPICS.find(t=>t.id===topic)||TOPICS[4];

  async function callAPI(userMsg){
    const newHistory=[...history,{role:'user',content:userMsg}];
    setHistory(newHistory);
    setLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:KB,messages:newHistory})
      });
      const data=await res.json();
      const reply=data.content?.find(b=>b.type==='text')?.text||'Sorry, I could not generate a response.';
      setHistory(h=>[...h,{role:'assistant',content:reply}]);
      return reply;
    }catch(e){return'Connection error. Please check your internet and try again.';}
    finally{setLoading(false);}
  }

  async function send(text){
    const msg=(text||input).trim();
    if(!msg||loading)return;
    setInput('');
    setMsgs(m=>[...m,{type:'user',text:msg}]);
    const reply=await callAPI(msg);
    const qs=parseQuiz(reply);
    if(qs.length>=3){
      setMsgs(m=>[...m,{type:'bot',text:`**Quiz ready!** 🎯 You have 10 minutes. Good luck!`,quiz:qs,quizId:Date.now()}]);
    }else{
      setMsgs(m=>[...m,{type:'bot',text:reply}]);
    }
  }

  function startMode(m){
    setMode(m);setMsgs([]);setHistory([]);
    if(m==='learn'){
      setMsgs([{type:'bot',text:`**Welcome to Learn Mode!** 📖\n\nI'm your personal Data Analytics Coach. Ask me anything about:\n\n- **SQL** — Joins, CTEs, Window Functions, Aggregations\n- **Python** — Pandas, NumPy, Matplotlib\n- **Statistics** — Hypothesis Testing, Probability, Descriptive Stats\n- **Tools** — Power BI, Tableau\n- **Workflows** — End-to-end analytics pipelines\n\nWhat would you like to explore today?`}]);
    }else if(m==='test'){
      setMsgs([{type:'bot',text:`**Welcome to Test Mode!** ⚡\n\nLet's assess your analytics knowledge! Select your difficulty and click **Start Quiz** — I'll generate a timed 5-question quiz on **${curTopic.label}**.\n\nChange the topic any time using the sidebar.`,isDiffSelect:true}]);
    }else if(m==='ask'){
      setMsgs([{type:'bot',text:`**Ask Me Anything!** 💬\n\nGot a specific question, concept to clarify, or code to debug? Type it in and I'll give you a clear, practical answer with real-world context.\n\n*Try: "Explain p-value in plain English" or "What's the difference between RANK() and DENSE_RANK()?"*`}]);
    }
  }

  async function startQuiz(){
    const topicLabel=curTopic.label==='All Topics'?'mixed data analytics (SQL, Python, Statistics, and BI Tools)':curTopic.label;
    const prompt=`Generate a ${diff} level quiz with exactly 5 multiple choice questions on ${topicLabel}. Number each question. Give 4 options (A/B/C/D). End with ANSWERS: 1-X,2-X,3-X,4-X,5-X on the last line.`;
    setMsgs(m=>[...m,{type:'user',text:`Start ${diff} ${topicLabel} quiz`}]);
    const reply=await callAPI(prompt);
    const qs=parseQuiz(reply);
    if(qs.length>=3){
      setMsgs(m=>[...m,{type:'bot',text:`**${diff} Quiz — ${curTopic.label}**\nTimer: 10 minutes • ${qs.length} questions`,quiz:qs,quizId:Date.now()}]);
    }else{
      setMsgs(m=>[...m,{type:'bot',text:reply}]);
    }
  }

  const QUICK={
    learn:['Explain SQL Joins with example','How do Window Functions work?','Pandas data cleaning steps','Explain hypothesis testing simply','What is the analytics workflow?'],
    ask:['Difference between RANK() and DENSE_RANK()','What is p-value in plain English?','Pandas vs NumPy — when to use which?','Power BI vs Tableau comparison','How does GROUP BY work?'],
  };

  return(
    <div className="coach">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="title">📊 DataCoach AI</div>
          <div className="sub">Your analytics mentor</div>
        </div>
        <div className="sidebar-section">Topics</div>
        {TOPICS.map(t=>(
          <button key={t.id} className={`topic-btn${topic===t.id?' active':''}`} onClick={()=>setTopic(t.id)}
            style={topic===t.id?{background:`${t.dot}20`,color:'#f1f5f9'}:{}}>
            <span className="topic-dot" style={{background:t.dot}}/>
            {t.label}
          </button>
        ))}
        <div className="sidebar-section">Mode</div>
        <div style={{padding:'0 8px'}}>
          {[{id:'learn',icon:'📖',label:'Learn'},{id:'test',icon:'⚡',label:'Test Me'},{id:'ask',icon:'💬',label:'Ask'}].map(m=>(
            <button key={m.id} className={`mode-btn${mode===m.id?' active-mode':''}`} onClick={()=>startMode(m.id)}>
              <span style={{fontSize:15}}>{m.icon}</span>{m.label}
            </button>
          ))}
        </div>
        <div className="sidebar-modes">
          <div style={{fontSize:10,color:'#334155',marginBottom:10,fontWeight:600,letterSpacing:'1px',textTransform:'uppercase'}}>Resources</div>
          {RESOURCES.map((r,i)=>(
            <a key={i} href={r.url} target="_blank" className="res-link-item" title={r.label}>{r.label}</a>
          ))}
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">
              {mode==='welcome'?'Data Analytics Coach':mode==='learn'?'Learn Mode':mode==='test'?'Test Mode':'Ask Anything'}
            </div>
            <div className="topbar-sub">
              {mode==='welcome'?'AI-powered analytics mentor':'Topic: '+curTopic.label+(mode==='test'?' • '+diff:'')}
            </div>
          </div>
          <span className="topbar-badge" style={{background:curTopic.badge,color:curTopic.badgeText}}>{curTopic.label}</span>
        </div>

        {mode==='welcome'?(
          <div className="chat-area" style={{justifyContent:'center',alignItems:'flex-start'}}>
            <div className="welcome">
              <h2>Hello! 👋 Welcome to DataCoach AI</h2>
              <p>Your AI-powered data analytics mentor. Learn concepts, take timed quizzes, and get instant answers — all powered by Claude AI with a curated analytics knowledge base.</p>
              <div className="welcome-cards">
                {[{id:'learn',icon:'📖',title:'Learn',desc:'Study with AI explanations & examples'},{id:'test',icon:'⚡',title:'Test Me',desc:'Timed MCQ quizzes with scoring'},{id:'ask',icon:'💬',title:'Ask',desc:'Get instant answers to any question'}].map(c=>(
                  <div key={c.id} className="welcome-card" onClick={()=>startMode(c.id)}>
                    <div className="wc-icon">{c.icon}</div>
                    <div className="wc-title">{c.title}</div>
                    <div className="wc-desc">{c.desc}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:12,color:'#94a3b8',marginBottom:10}}>Quick start:</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {['Explain SQL Window Functions','How do I clean data in Pandas?','What is A/B testing?','Tableau vs Power BI?'].map(q=>(
                  <button key={q} className="quick-btn" onClick={()=>{startMode('ask');setTimeout(()=>send(q),80)}}>{q}</button>
                ))}
              </div>
            </div>
          </div>
        ):(
          <>
            <div className="chat-area" ref={chatRef}>
              {msgs.map((m,i)=>(
                <div key={i} className={`msg ${m.type}`}>
                  <div className={`avatar ${m.type}`}>{m.type==='bot'?'AI':'U'}</div>
                  <div className={`bubble ${m.type}`}>
                    {m.type==='bot'?(
                      <>
                        <div dangerouslySetInnerHTML={{__html:parseMD(m.text)}}/>
                        {m.isDiffSelect&&(
                          <div style={{marginTop:14}}>
                            <div style={{fontSize:12,color:'#64748b',marginBottom:6}}>Select difficulty:</div>
                            <div className="diff-btns">
                              {['Beginner','Intermediate','Advanced'].map(d=>(
                                <button key={d} className={`diff-btn${diff===d?' sel':''}`} onClick={()=>setDiff(d)}>{d}</button>
                              ))}
                            </div>
                            <button onClick={startQuiz} disabled={loading} style={{marginTop:14,padding:'10px 22px',background:'#6366f1',color:'#fff',border:'none',borderRadius:9,cursor:'pointer',fontFamily:'Sora,sans-serif',fontSize:13.5,fontWeight:600,transition:'all 0.15s'}}>
                              {loading?'Generating…':'Start Quiz ↗'}
                            </button>
                          </div>
                        )}
                        {m.quiz&&!m.scoreShown&&(
                          <QuizWidget questions={m.quiz} onDone={(score,total,answers,questions)=>{
                            setMsgs(prev=>prev.map((msg,idx)=>idx===i?{...msg,scoreShown:true}:msg));
                            setMsgs(prev=>[...prev,{type:'bot',text:'',isScore:true,score,total,qs:questions,answers}]);
                            callAPI(`The user just scored ${score} out of ${total} on a ${diff} ${curTopic.label} quiz. Give warm, specific 2-sentence feedback and one concrete next study action.`).then(r=>{
                              setMsgs(prev=>[...prev,{type:'bot',text:r}]);
                            });
                          }}/>
                        )}
                        {m.isScore&&<ScoreCard score={m.score} total={m.total} questions={m.qs} answers={m.answers}/>}
                      </>
                    ):(
                      <span>{m.text}</span>
                    )}
                  </div>
                </div>
              ))}
              {loading&&(
                <div className="msg bot">
                  <div className="avatar bot">AI</div>
                  <div className="typing"><span/><span/><span/></div>
                </div>
              )}
            </div>

            {(QUICK[mode]||[]).length>0&&msgs.length<=1&&(
              <div className="quick-btns">
                {(QUICK[mode]).map(q=>(
                  <button key={q} className="quick-btn" onClick={()=>send(q)}>{q}</button>
                ))}
              </div>
            )}

            {mode!=='test'&&(
              <div className="input-area">
                <div className="input-wrap">
                  <textarea ref={inputRef} className="chat-input" value={input}
                    placeholder={mode==='learn'?'Ask about any analytics concept…':'Ask any data analytics question…'}
                    rows={1} onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
                </div>
                <button className="send-btn" disabled={!input.trim()||loading} onClick={()=>send()}>
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                  </svg>
                </button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
